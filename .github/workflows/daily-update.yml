name: DevSync Daily Update

on:
  schedule:
    - cron: '23 6 * * *'
  workflow_dispatch:

permissions:
  contents: write   # REQUIRED for git push

jobs:
  auto-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: 24f1002578@ds.study.iitm.ac.in
        run: echo "DevSync scheduled workflow running"

      - name: Create daily commit
        run: |
          echo "Last run: $(date -u)" >> daily-status.txt
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add daily-status.txt
          git commit -m "Automated daily update $(date -u)" || echo "No changes"
          git push
